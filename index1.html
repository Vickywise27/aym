<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Area 2 AYM – Bible Truths Mock Exam</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--em:#10b981;--em2:#34d399;--em3:#059669;--em-glow:rgba(16,185,129,0.35);--em-soft:rgba(16,185,129,0.12);--em-border:rgba(16,185,129,0.28);--blue:#3b82f6;--red:#ef4444;--orange:#f97316;--glass:rgba(255,255,255,0.07);--glass2:rgba(255,255,255,0.12);--glass3:rgba(255,255,255,0.04);--gbl:1px solid rgba(255,255,255,0.13);--bg1:#020c07;--text:#f0fdf4;--text2:rgba(240,253,244,0.65);--text3:rgba(240,253,244,0.38);--r:16px;--r2:12px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg1);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(16,185,129,0.18) 0%,transparent 60%),radial-gradient(ellipse 60% 70% at 80% 80%,rgba(5,150,105,0.14) 0%,transparent 55%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 1px 1px,rgba(16,185,129,0.07) 1px,transparent 0);background-size:32px 32px;pointer-events:none;z-index:0;}
#cover-page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem 1.2rem;}
.c-badge{display:inline-flex;align-items:center;gap:.45rem;background:var(--em-soft);border:1px solid var(--em-border);border-radius:50px;padding:.32rem .9rem;font-size:.68rem;font-weight:600;color:var(--em2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:1.4rem;}
.c-badge::before{content:'✦';opacity:.7;}
.c-title{font-family:'Cormorant Garamond',serif;color:var(--text);font-size:clamp(2rem,6vw,3rem);text-align:center;line-height:1.15;margin-bottom:.3rem;font-weight:600;}
.c-title span{color:var(--em2);}
.c-sub{color:var(--text3);font-size:.77rem;text-align:center;margin-bottom:2.2rem;font-weight:300;letter-spacing:.03em;}
.c-card{background:var(--glass);backdrop-filter:blur(24px) saturate(1.4);-webkit-backdrop-filter:blur(24px) saturate(1.4);border:var(--gbl);border-radius:20px;padding:1.8rem 1.6rem;width:100%;max-width:400px;display:flex;flex-direction:column;gap:1.1rem;box-shadow:0 8px 32px rgba(0,0,0,0.4),0 0 0 1px rgba(16,185,129,0.08),inset 0 1px 0 rgba(255,255,255,0.1);}
.lbl{display:block;color:var(--text3);font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.4rem;}
.inp{width:100%;background:var(--glass3);border:1px solid rgba(255,255,255,0.1);border-radius:var(--r2);padding:.72rem 1rem;color:var(--text);font-family:'Outfit',sans-serif;font-size:.88rem;outline:none;transition:border-color .2s,box-shadow .2s;backdrop-filter:blur(8px);}
.inp:focus{border-color:var(--em);box-shadow:0 0 0 3px var(--em-soft),0 0 20px var(--em-glow);}
.inp::placeholder{color:var(--text3);}
.inp option{background:#041a0e;color:var(--text);}
.cnt-row{display:flex;gap:.45rem;}
.cnt-btn{flex:1;padding:.6rem .3rem;background:var(--glass3);border:1px solid rgba(255,255,255,0.1);border-radius:var(--r2);color:var(--text2);font-family:'Outfit',sans-serif;font-size:.83rem;font-weight:600;cursor:pointer;transition:all .2s;text-align:center;}
.cnt-btn:hover{border-color:var(--em-border);color:var(--em2);}
.cnt-btn.on{background:var(--em-soft);border-color:var(--em);color:var(--em2);box-shadow:0 0 12px var(--em-glow);}
.err{color:#f87171;font-size:.72rem;margin-top:.3rem;}
.btn-go{background:linear-gradient(135deg,var(--em3),var(--em));color:#fff;font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:700;border:none;border-radius:var(--r2);padding:.85rem;cursor:pointer;width:100%;transition:all .2s;margin-top:.3rem;letter-spacing:.03em;box-shadow:0 4px 20px var(--em-glow);}
.btn-go:hover{transform:translateY(-1px);box-shadow:0 6px 28px var(--em-glow);}
#quiz-page{display:none;min-height:100vh;padding-bottom:100px;position:relative;z-index:1;}
.qh{background:rgba(2,12,7,0.75);backdrop-filter:blur(20px) saturate(1.6);-webkit-backdrop-filter:blur(20px) saturate(1.6);border-bottom:1px solid rgba(16,185,129,0.15);padding:.7rem 1.2rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem;position:sticky;top:0;z-index:100;}
.qhl{display:flex;align-items:center;gap:.8rem;}
.hl{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--em-border);background:var(--em-soft);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:var(--em2);}
.ht{color:var(--text);font-size:.82rem;font-weight:600;}
.hs{color:var(--text3);font-size:.65rem;margin-top:1px;}
.tmr{display:flex;align-items:center;gap:.35rem;background:var(--glass);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:.32rem .75rem;backdrop-filter:blur(10px);}
.tv{color:var(--em2);font-size:.92rem;font-weight:700;font-variant-numeric:tabular-nums;}
.tv.warn{color:#f87171;animation:pulse .7s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.dbtn{background:var(--glass);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:.32rem .65rem;color:var(--text2);font-size:.7rem;cursor:pointer;transition:all .15s;}
.dbtn:hover{background:var(--glass2);border-color:var(--em-border);}
.pb{height:2px;background:rgba(255,255,255,0.06);}
.pf{height:100%;background:linear-gradient(90deg,var(--em3),var(--em2));transition:width .4s cubic-bezier(.4,0,.2,1);box-shadow:0 0 8px var(--em-glow);}
.qw{max-width:700px;margin:0 auto;padding:1.3rem 1rem;}
.qcard{background:var(--glass);backdrop-filter:blur(28px) saturate(1.5);-webkit-backdrop-filter:blur(28px) saturate(1.5);border:var(--gbl);border-radius:20px;padding:1.6rem;box-shadow:0 8px 32px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.09);}
.qmeta{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem;}
.qbadge{background:var(--em-soft);border:1px solid var(--em-border);color:var(--em2);font-size:.67rem;font-weight:700;padding:.24rem .7rem;border-radius:50px;letter-spacing:.06em;}
.qcat{font-size:.63rem;color:var(--text3);max-width:55%;text-align:right;}
.qtxt{font-family:'Cormorant Garamond',serif;font-size:1.05rem;line-height:1.65;margin-bottom:1.3rem;color:var(--text);font-weight:600;}
.opts{display:flex;flex-direction:column;gap:.55rem;}
.opt{display:flex;align-items:flex-start;gap:.8rem;padding:.75rem .95rem;border:1px solid rgba(255,255,255,0.09);border-radius:var(--r2);cursor:pointer;transition:all .18s;background:var(--glass3);}
.opt:hover{border-color:var(--em-border);background:var(--em-soft);}
.opt.sel{border-color:var(--em);background:rgba(16,185,129,0.1);box-shadow:0 0 0 1px var(--em),0 0 16px rgba(16,185,129,0.15);}
.opt input{display:none;}
.ok{width:24px;height:24px;min-width:24px;border-radius:50%;background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:var(--text3);transition:all .18s;flex-shrink:0;margin-top:1px;}
.opt.sel .ok{background:var(--em);border-color:var(--em);color:#fff;box-shadow:0 0 10px var(--em-glow);}
.ot{font-size:.86rem;line-height:1.5;color:var(--text2);}
.opt.sel .ot{color:var(--text);}
.qbtns{display:flex;gap:.55rem;margin-top:1.1rem;}
.bn{flex:1;padding:.68rem;border-radius:var(--r2);border:1px solid rgba(255,255,255,0.1);background:var(--glass3);color:var(--text2);font-family:'Outfit',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .18s;}
.bn:hover{border-color:rgba(255,255,255,0.2);background:var(--glass);color:var(--text);}
.bskip{color:var(--orange);border-color:rgba(249,115,22,0.25);}
.bskip:hover{background:rgba(249,115,22,0.1);border-color:var(--orange);color:var(--orange);}
.bnext{background:linear-gradient(135deg,var(--em3),var(--em));color:#fff;border-color:transparent;box-shadow:0 2px 14px var(--em-glow);}
.bnext:hover{transform:translateY(-1px);box-shadow:0 4px 20px var(--em-glow);color:#fff;}
#nav-panel{display:none;position:fixed;bottom:0;left:0;right:0;z-index:500;background:rgba(2,12,7,0.82);backdrop-filter:blur(24px) saturate(1.6);-webkit-backdrop-filter:blur(24px) saturate(1.6);border-top:1px solid rgba(16,185,129,0.18);padding:.6rem 1rem .65rem;box-shadow:0 -4px 24px rgba(0,0,0,0.35);}
.nt{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;gap:.5rem;}
.nleg{display:flex;gap:.7rem;}
.nli{display:flex;align-items:center;gap:.3rem;font-size:.63rem;color:var(--text3);}
.nd{width:8px;height:8px;border-radius:2px;}
.nd-a{background:var(--em);box-shadow:0 0 6px var(--em-glow);}
.nd-s{background:var(--orange);}
.nd-u{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);}
.bsub{background:linear-gradient(135deg,var(--em3),var(--em));color:#fff;border:none;border-radius:8px;padding:.38rem .9rem;font-family:'Outfit',sans-serif;font-size:.76rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .18s;box-shadow:0 2px 12px var(--em-glow);}
.bsub:hover{transform:translateY(-1px);box-shadow:0 4px 18px var(--em-glow);}
.nscroll{overflow-x:auto;overflow-y:hidden;scrollbar-width:none;}
.nscroll::-webkit-scrollbar{display:none;}
.ngrid{display:flex;gap:.28rem;padding-bottom:1px;}
.nb{width:26px;height:26px;min-width:26px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:var(--glass3);color:var(--text2);font-size:.62rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s;}
.nb:hover{border-color:var(--em-border);color:var(--em2);}
.nb.ans{background:var(--em-soft);border-color:var(--em);color:var(--em2);}
.nb.ski{background:rgba(249,115,22,0.15);border-color:var(--orange);color:var(--orange);}
.nb.cur{outline:2px solid var(--em2);outline-offset:2px;box-shadow:0 0 10px var(--em-glow);}
#results-page{display:none;min-height:100vh;padding:1.5rem 1rem 4rem;position:relative;z-index:1;}
.rw{max-width:700px;margin:0 auto;}
.rtb{display:flex;justify-content:flex-end;margin-bottom:.8rem;}
.db2{background:var(--glass);border:var(--gbl);border-radius:8px;padding:.35rem .8rem;font-family:'Outfit',sans-serif;font-size:.72rem;color:var(--text2);cursor:pointer;backdrop-filter:blur(10px);transition:all .15s;}
.db2:hover{border-color:var(--em-border);color:var(--em2);}
.rh{background:var(--glass);backdrop-filter:blur(28px) saturate(1.5);-webkit-backdrop-filter:blur(28px) saturate(1.5);border:var(--gbl);border-radius:20px;padding:2rem 1.5rem;text-align:center;margin-bottom:1.4rem;box-shadow:0 8px 32px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.09);position:relative;overflow:hidden;}
.rh::before{content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(16,185,129,0.2),transparent 70%);pointer-events:none;}
.rname{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;margin-bottom:.25rem;color:var(--text);}
.rdist{font-size:.73rem;color:var(--text3);margin-bottom:1.5rem;}
.sring{width:110px;height:110px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.3rem;}
.si{width:82px;height:82px;border-radius:50%;background:var(--glass);border:1px solid rgba(255,255,255,0.12);backdrop-filter:blur(12px);display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(16,185,129,0.2);}
.sp{font-size:1.2rem;font-weight:700;color:var(--em2);}
.sl{font-size:.48rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-top:1px;}
.sts{display:flex;justify-content:center;gap:2.5rem;}
.sn{font-size:1.4rem;font-weight:700;}
.sk{font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
.rtitle{font-family:'Cormorant Garamond',serif;font-size:1.05rem;margin-bottom:1rem;color:var(--text2);}
.rq{background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:var(--gbl);border-left:3px solid transparent;border-radius:var(--r);padding:1.1rem 1.1rem 1.1rem 1.2rem;margin-bottom:.7rem;}
.rq.c{border-left-color:var(--em);}
.rq.w{border-left-color:var(--red);}
.rq.s{border-left-color:var(--orange);}
.rqt{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;}
.rqn{font-size:.64rem;color:var(--text3);}
.rqs{font-size:.64rem;font-weight:700;padding:.18rem .5rem;border-radius:50px;}
.rqs.c{background:rgba(16,185,129,0.15);color:var(--em2);}
.rqs.w{background:rgba(239,68,68,0.12);color:#f87171;}
.rqs.s{background:rgba(249,115,22,0.12);color:var(--orange);}
.rqq{font-size:.88rem;margin-bottom:.6rem;line-height:1.55;color:var(--text);}
.ra{font-size:.79rem;padding:.32rem .65rem;border-radius:7px;margin-bottom:.28rem;}
.yw{background:rgba(239,68,68,0.1);color:#f87171;border:1px solid rgba(239,68,68,0.2);}
.yc{background:rgba(16,185,129,0.1);color:var(--em2);border:1px solid var(--em-border);}
.co{background:rgba(59,130,246,0.1);color:#93c5fd;border:1px solid rgba(59,130,246,0.2);}
.rref{font-size:.61rem;color:var(--text3);margin-top:.5rem;}
.btn-rt{display:block;width:100%;max-width:700px;margin:1.5rem auto 0;background:linear-gradient(135deg,var(--em3),var(--em));color:#fff;border:none;border-radius:var(--r);padding:.95rem;font-family:'Outfit',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.03em;box-shadow:0 4px 20px var(--em-glow);}
.btn-rt:hover{transform:translateY(-2px);box-shadow:0 8px 28px var(--em-glow);}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
#cover-page>*{animation:fadeUp .5s ease both;}
#cover-page>*:nth-child(1){animation-delay:.05s;}
#cover-page>*:nth-child(2){animation-delay:.12s;}
#cover-page>*:nth-child(3){animation-delay:.18s;}
#cover-page>*:nth-child(4){animation-delay:.25s;}
</style>
</head>
<body>
<div id="cover-page">
  <div class="c-badge">Area 2 AYM.</div>
  <div class="c-title">Bible Truths<br><span>Mock Exam</span></div>
  <div class="c-sub">A Course in Bible Doctrine.</div>
  <div class="c-card">
    <div>
      <label class="lbl" for="cand-name">Full Name</label>
      <input class="inp" id="cand-name" type="text" placeholder="Enter your full name">
      <div class="err" id="err-name"></div>
    </div>
    <div>
      <label class="lbl" for="cand-district">District</label>
      <select class="inp" id="cand-district">
        <option value="">— Select your district —</option>
        <option>Iheorji-Umuogele</option>
        <option>Eziukwu-Aba</option>
        <option>Umuagbahi District</option>
        <option>Umunisii Group</option>
        <option>Port-harcourt Road Group</option>
      </select>
      <div class="err" id="err-district"></div>
    </div>
    <div>
      <label class="lbl">Number of Questions</label>
      <div class="cnt-row">
        <button class="cnt-btn" onclick="setCount(25,this)">25</button>
        <button class="cnt-btn on" onclick="setCount(50,this)">50</button>
        <button class="cnt-btn" onclick="setCount(100,this)">100</button>
        <button class="cnt-btn" onclick="setCount(200,this)">All</button>
      </div>
    </div>
    <button class="btn-go" onclick="startQuiz()">Begin Examination ▶</button>
  </div>
</div>
<div id="quiz-page">
  <div class="qh">
    <div class="qhl">
      <div class="hl">✦</div>
      <div><div class="ht">Bible Truths Mock Exam</div><div class="hs" id="header-sub"></div></div>
    </div>
    <div style="display:flex;align-items:center;gap:.5rem;">
      <div class="tmr">⏱ <span class="tv" id="timer-val">30:00</span></div>
      <button class="dbtn" onclick="toggleDark()">🌙</button>
    </div>
  </div>
  <div class="pb"><div class="pf" id="prog-fill" style="width:0%"></div></div>
  <div class="qw">
    <div class="qcard">
      <div class="qmeta">
        <span class="qbadge" id="q-badge">Q 1 / 50</span>
        <span class="qcat" id="q-cat"></span>
      </div>
      <div class="qtxt" id="q-text"></div>
      <div class="opts" id="opts"></div>
      <div class="qbtns">
        <button class="bn" onclick="navigate(-1)">◀ Prev</button>
        <button class="bn bskip" onclick="skipQ()">↷ Skip</button>
        <button class="bn bnext" onclick="navigate(1)">Next ▶</button>
      </div>
    </div>
  </div>
</div>
<div id="nav-panel">
  <div class="nt">
    <div class="nleg">
      <div class="nli"><div class="nd nd-a"></div>Answered</div>
      <div class="nli"><div class="nd nd-s"></div>Skipped</div>
      <div class="nli"><div class="nd nd-u"></div>Unanswered</div>
    </div>
    <button class="bsub" onclick="confirmSubmit()">✔ Submit</button>
  </div>
  <div class="nscroll"><div class="ngrid" id="nav-grid"></div></div>
</div>
<div id="results-page">
  <div class="rw">
    <div class="rtb"><button class="db2" onclick="toggleDark()">🌙 Dark Mode</button></div>
    <div class="rh">
      <div class="rname" id="res-name"></div>
      <div class="rdist" id="res-dist"></div>
      <div class="sring" id="score-ring">
        <div class="si"><div class="sp" id="score-pct">0%</div><div class="sl">SCORE</div></div>
      </div>
      <div class="sts">
        <div><div class="sn" id="s-correct" style="color:#34d399"></div><div class="sk">Correct</div></div>
        <div><div class="sn" id="s-wrong" style="color:#f87171"></div><div class="sk">Wrong</div></div>
        <div><div class="sn" id="s-skipped" style="color:#fb923c"></div><div class="sk">Skipped</div></div>
      </div>
    </div>
    <div class="rtitle">📖 Review &amp; Corrections</div>
    <div id="review-list"></div>
    <button class="btn-rt" onclick="retake()">↺ Retake Examination</button>
  </div>
</div>
<script>
const ALL_Q = [

  // ── Section 1: The Scriptures ──
  {cat:"Section 1 – The Scriptures",q:"According to Hebrews 11:6, what two things must a person who draws near to God believe?",o:["That God exists and that He is loving","That God exists and that He rewards those who seek Him","That Jesus is Lord and that He will return","That the Bible is true and that prayer works"],a:1},
  {cat:"Section 1 – The Scriptures",q:"The Bible writers make no attempt to prove that God exists. How is the existence of God described in the Bible?",o:["A philosophical argument","A scientific theory","A revealed truth","A human tradition"],a:2},
  {cat:"Section 1 – The Scriptures",q:"Which of the following is NOT listed as a consideration contributing toward belief in the existence of God?",o:["The universal desire to worship","The existence of the material universe","The prophecies of the Scriptures","The opinions of modern philosophers"],a:3},
  {cat:"Section 1 – The Scriptures",q:"According to Proverbs 1:7, what is described as the basis of wisdom?",o:["Knowledge of science","Fear of the Lord","Study of Scripture","Love of neighbour"],a:1},
  {cat:"Section 1 – The Scriptures",q:"How has God revealed Himself according to Psalm 19:1–4?",o:["Through angels speaking to men","Through the material universe and nature","Through the writings of philosophers","Through dreams and visions only"],a:1},
  {cat:"Section 1 – The Scriptures",q:"According to Amos 3:7, what does the Lord never do without telling His servants the prophets?",o:["Send rain on the earth","Reveal the names of the wicked","Do anything","Open the gates of heaven"],a:2},
  {cat:"Section 1 – The Scriptures",q:"What is described as the best and fullest revelation of God?",o:["The Ten Commandments","The writings of the prophets","The person of Jesus Christ","The book of Psalms"],a:2},
  {cat:"Section 1 – The Scriptures",q:"The word 'Bible' comes from the Greek word 'biblos', which means what?",o:["Truth","Book","Light","Word"],a:1},
  {cat:"Section 1 – The Scriptures",q:"How many books are contained in the Bible?",o:["39","66","27","73"],a:1},
  {cat:"Section 1 – The Scriptures",q:"Who was the earliest writer of Scripture, writing approximately 1,500 years before Christ?",o:["David","Isaiah","Moses","Job"],a:2},

// ════════════════════════
// STATE
// ════════════════════════
let candName = '', candDistrict = '';
let selectedCount = 50;
let activeQ = [];
let userAns = [];
let currentQ = 0;
let timerInt = null;
let secsLeft = 1800;
let submitted = false;

function setCount(n, btn) {
  selectedCount = n;
  document.querySelectorAll('.cnt-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ════════════════════════
// START
// ════════════════════════
function startQuiz() {
  candName = document.getElementById('cand-name').value.trim();
  candDistrict = document.getElementById('cand-district').value;
  let ok = true;
  document.getElementById('err-name').textContent = '';
  document.getElementById('err-district').textContent = '';
  if (!candName) { document.getElementById('err-name').textContent = 'Please enter your full name.'; ok = false; }
  if (!candDistrict) { document.getElementById('err-district').textContent = 'Please select your district.'; ok = false; }
  if (!ok) return;

  const count = selectedCount >= ALL_Q.length ? ALL_Q.length : selectedCount;
  activeQ = shuffle(ALL_Q).slice(0, count);
  userAns = new Array(activeQ.length).fill(null);
  currentQ = 0;
  submitted = false;
  secsLeft = count <= 25 ? 900 : count <= 50 ? 1800 : count <= 100 ? 3600 : 5400;

  document.getElementById('cover-page').style.display = 'none';
  document.getElementById('quiz-page').style.display = 'block';
  document.getElementById('nav-panel').style.display = 'block';
  document.getElementById('header-sub').textContent = candName + ' · ' + candDistrict;

  buildGrid();
  renderQ();
  startTimer();
}

// ════════════════════════
// TIMER
// ════════════════════════
function startTimer() {
  const el = document.getElementById('timer-val');
  function fmt() {
    const m = Math.floor(secsLeft / 60), s = secsLeft % 60;
    el.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  }
  fmt();
  timerInt = setInterval(() => {
    secsLeft--;
    fmt();
    if (secsLeft <= 300) el.classList.add('warn');
    if (secsLeft <= 0) { clearInterval(timerInt); submitQuiz(); }
  }, 1000);
}

// ════════════════════════
// RENDER
// ════════════════════════
function renderQ() {
  const q = activeQ[currentQ];
  document.getElementById('q-badge').textContent = `Q ${currentQ + 1} / ${activeQ.length}`;
  document.getElementById('q-cat').textContent = q.cat;
  document.getElementById('q-text').textContent = q.q;

  const optsEl = document.getElementById('opts');
  optsEl.innerHTML = '';
  ['A','B','C','D'].forEach((lt, i) => {
    const lbl = document.createElement('label');
    lbl.className = 'opt' + (userAns[currentQ] === i ? ' sel' : '');
    lbl.innerHTML = `<input type="radio" name="opt" value="${i}">
      <span class="ok">${lt}</span>
      <span class="ot">${q.o[i]}</span>`;
    lbl.addEventListener('click', () => selectAns(i));
    optsEl.appendChild(lbl);
  });

  updateGrid();
  updateProg();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectAns(idx) {
  userAns[currentQ] = idx;
  document.querySelectorAll('.opt').forEach((l, i) => l.classList.toggle('sel', i === idx));
  updateGrid();
}

// ════════════════════════
// NAV
// ════════════════════════
function navigate(dir) {
  const n = currentQ + dir;
  if (n < 0 || n >= activeQ.length) return;
  currentQ = n;
  renderQ();
}

function skipQ() {
  if (userAns[currentQ] === null) userAns[currentQ] = -1;
  navigate(1);
}

function jumpTo(idx) { currentQ = idx; renderQ(); }

function buildGrid() {
  const g = document.getElementById('nav-grid');
  g.innerHTML = '';
  activeQ.forEach((_, i) => {
    const b = document.createElement('button');
    b.className = 'nb';
    b.textContent = i + 1;
    b.id = `nb${i}`;
    b.addEventListener('click', () => jumpTo(i));
    g.appendChild(b);
  });
}

function updateGrid() {
  activeQ.forEach((_, i) => {
    const b = document.getElementById(`nb${i}`);
    if (!b) return;
    b.className = 'nb';
    if (userAns[i] === -1) b.classList.add('ski');
    else if (userAns[i] !== null) b.classList.add('ans');
    if (i === currentQ) b.classList.add('cur');
  });
}

function updateProg() {
  const done = userAns.filter(a => a !== null && a !== -1).length;
  document.getElementById('prog-fill').style.width = (done / activeQ.length * 100) + '%';
}

// ════════════════════════
// SUBMIT
// ════════════════════════
function confirmSubmit() {
  const u = userAns.filter(a => a === null).length;
  let msg = 'Submit your examination now?';
  if (u > 0) msg += `\n\n⚠ ${u} question(s) unanswered.`;
  if (confirm(msg)) submitQuiz();
}

function submitQuiz() {
  if (submitted) return;
  submitted = true;
  clearInterval(timerInt);

  let correct = 0, wrong = 0, skipped = 0;
  activeQ.forEach((q, i) => {
    if (userAns[i] === null || userAns[i] === -1) skipped++;
    else if (userAns[i] === q.a) correct++;
    else wrong++;
  });

  const pct = Math.round(correct / activeQ.length * 100);

  document.getElementById('quiz-page').style.display = 'none';
  document.getElementById('nav-panel').style.display = 'none';
  document.getElementById('results-page').style.display = 'block';

  document.getElementById('res-name').textContent = candName;
  document.getElementById('res-dist').textContent = candDistrict;
  document.getElementById('score-pct').textContent = pct + '%';
  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-wrong').textContent = wrong;
  document.getElementById('s-skipped').textContent = skipped;
  document.getElementById('score-ring').style.background =
    `conic-gradient(#f0c040 ${pct * 3.6}deg, rgba(240,192,64,0.15) ${pct * 3.6}deg)`;

  const rl = document.getElementById('review-list');
  rl.innerHTML = '';
  activeQ.forEach((q, i) => {
    const ua = userAns[i];
    let cls = 's', stxt = '↷ Skipped';
    if (ua !== null && ua !== -1) {
      cls = ua === q.a ? 'c' : 'w';
      stxt = ua === q.a ? '✓ Correct' : '✗ Wrong';
    }
    let ah = '';
    if (ua !== null && ua !== -1 && ua !== q.a) {
      ah = `<div class="ra yw">Your answer: ${q.o[ua]}</div><div class="ra co">Correct answer: ${q.o[q.a]}</div>`;
    } else if (ua === q.a) {
      ah = `<div class="ra yc">✓ ${q.o[q.a]}</div>`;
    } else {
      ah = `<div class="ra co">Correct answer: ${q.o[q.a]}</div>`;
    }
    const div = document.createElement('div');
    div.className = `rq ${cls}`;
    div.innerHTML = `
      <div class="rqt">
        <span class="rqn">Q${i+1} · ${q.cat}</span>
        <span class="rqs ${cls}">${stxt}</span>
      </div>
      <div class="rqq">${q.q}</div>
      ${ah}
      <div class="rref">📘 ${q.cat}</div>`;
    rl.appendChild(div);
  });

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function retake() {
  submitted = false;
  clearInterval(timerInt);
  document.getElementById('results-page').style.display = 'none';
  document.getElementById('cover-page').style.display = 'flex';
  document.getElementById('timer-val').textContent = '30:00';
  document.getElementById('timer-val').classList.remove('warn');
}

function toggleDark() {
  document.body.classList.toggle('dark');
}
</script>
</body>
