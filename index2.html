<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Area 2 AYM – Church Heritage Mock Exam</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#d4a017;--gold-l:#f0c040;
  --navy:#0f1f3d;--navy2:#1a3260;
  --blue:#2563eb;--green:#16a34a;--red:#dc2626;--orange:#ea580c;
  --bg:#f8f9fc;--card:#ffffff;--text:#111827;--muted:#6b7280;--border:#e5e7eb;
  --r:10px;--sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
}
body.dark{--bg:#0d1117;--card:#161b22;--text:#e6edf3;--muted:#8b949e;--border:#30363d;--sh:0 1px 3px rgba(0,0,0,.4);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s}

/* COVER */
#cover-page{min-height:100vh;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.2rem;}
.c-logo{width:76px;height:76px;border-radius:50%;border:2px solid var(--gold-l);object-fit:contain;margin-bottom:1.1rem;background:var(--navy2);}
.c-title{font-family:'Playfair Display',serif;color:#fff;font-size:clamp(1.25rem,4vw,1.8rem);text-align:center;line-height:1.3;margin-bottom:.3rem;}
.c-sub{color:rgba(255,255,255,.45);font-size:.82rem;text-align:center;margin-bottom:1.8rem;}
.c-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:1.5rem;width:100%;max-width:400px;display:flex;flex-direction:column;gap:.95rem;}
.lbl{display:block;color:rgba(255,255,255,.55);font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.3rem;}
.inp{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:.62rem .88rem;color:#fff;font-family:'Inter',sans-serif;font-size:.88rem;outline:none;transition:border-color .15s;}
.inp:focus{border-color:var(--gold-l);}
.inp::placeholder{color:rgba(255,255,255,.28);}
.inp option{background:var(--navy);color:#fff;}
.cnt-row{display:flex;gap:.5rem;}
.cnt-btn{flex:1;padding:.58rem .4rem;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.13);border-radius:8px;color:rgba(255,255,255,.65);font-family:'Inter',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .15s;text-align:center;}
.cnt-btn.on{background:var(--gold-l);border-color:var(--gold-l);color:var(--navy);}
.err{color:#f87171;font-size:.73rem;margin-top:.2rem;}
.btn-go{background:var(--gold-l);color:var(--navy);font-family:'Inter',sans-serif;font-size:.88rem;font-weight:700;border:none;border-radius:8px;padding:.78rem;cursor:pointer;width:100%;transition:opacity .15s;margin-top:.2rem;}
.btn-go:hover{opacity:.87;}

/* QUIZ */
#quiz-page{display:none;min-height:100vh;padding-bottom:90px;}
.qh{background:var(--navy);padding:.65rem 1.1rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem;position:sticky;top:0;z-index:100;box-shadow:0 1px 0 rgba(255,255,255,.06);}
.qhl{display:flex;align-items:center;gap:.65rem;}
.hl{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--gold-l);background:var(--navy2);}
.ht{color:#fff;font-size:.8rem;font-weight:600;}
.hs{color:rgba(255,255,255,.4);font-size:.65rem;}
.tmr{display:flex;align-items:center;gap:.3rem;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.11);border-radius:6px;padding:.28rem .65rem;}
.tv{color:var(--gold-l);font-size:.95rem;font-weight:700;font-variant-numeric:tabular-nums;}
.tv.warn{color:#f87171;animation:p .7s infinite;}
@keyframes p{0%,100%{opacity:1}50%{opacity:.35}}
.dbtn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.11);border-radius:6px;padding:.28rem .6rem;color:rgba(255,255,255,.65);font-size:.7rem;cursor:pointer;transition:background .15s;}
.dbtn:hover{background:rgba(255,255,255,.15);}
.pb{height:3px;background:var(--border);}
.pf{height:100%;background:var(--gold-l);transition:width .3s;}

/* QUESTION */
.qw{max-width:680px;margin:0 auto;padding:1.1rem .9rem;}
.qcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.3rem;box-shadow:var(--sh);}
.qmeta{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem;}
.qbadge{background:var(--navy);color:var(--gold-l);font-size:.67rem;font-weight:700;padding:.22rem .6rem;border-radius:20px;}
.qcat{font-size:.65rem;color:var(--muted);}
.qtxt{font-family:'Playfair Display',serif;font-size:.97rem;line-height:1.6;margin-bottom:1rem;}
.opts{display:flex;flex-direction:column;gap:.5rem;}
.opt{display:flex;align-items:flex-start;gap:.75rem;padding:.65rem .8rem;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;transition:border-color .15s,background .15s;background:var(--card);}
.opt:hover{border-color:var(--gold);}
.opt.sel{border-color:var(--blue);background:rgba(37,99,235,.06);}
.opt input{display:none;}
.ok{width:22px;height:22px;min-width:22px;border-radius:50%;background:var(--bg);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:var(--muted);transition:all .15s;}
.opt.sel .ok{background:var(--blue);border-color:var(--blue);color:#fff;}
.ot{font-size:.85rem;line-height:1.5;padding-top:1px;}
.qbtns{display:flex;gap:.55rem;margin-top:.9rem;}
.bn{flex:1;padding:.62rem;border-radius:8px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-family:'Inter',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .15s;}
.bn:hover{border-color:var(--gold);}
.bskip{color:var(--orange);border-color:rgba(234,88,12,.28);background:rgba(234,88,12,.04);}
.bskip:hover{background:var(--orange);color:#fff;border-color:var(--orange);}
.bnext{background:var(--navy);color:#fff;border-color:var(--navy);}
.bnext:hover{background:var(--navy2);border-color:var(--navy2);}

/* NAV PANEL */
#nav-panel{display:none;position:fixed;bottom:0;left:0;right:0;z-index:500;background:var(--card);border-top:1px solid var(--border);padding:.5rem .9rem .55rem;box-shadow:0 -2px 10px rgba(0,0,0,.09);}
.nt{display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem;gap:.5rem;}
.nleg{display:flex;gap:.65rem;}
.nli{display:flex;align-items:center;gap:.28rem;font-size:.63rem;color:var(--muted);}
.nd{width:8px;height:8px;border-radius:2px;}
.nd-a{background:var(--blue);}
.nd-s{background:var(--orange);}
.nd-u{background:var(--border);border:1px solid #aaa;}
.bsub{background:var(--green);color:#fff;border:none;border-radius:7px;padding:.36rem .85rem;font-family:'Inter',sans-serif;font-size:.76rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:opacity .15s;}
.bsub:hover{opacity:.84;}
.nscroll{overflow-x:auto;overflow-y:hidden;scrollbar-width:none;}
.nscroll::-webkit-scrollbar{display:none;}
.ngrid{display:flex;gap:.26rem;padding-bottom:1px;}
.nb{width:25px;height:25px;min-width:25px;border-radius:5px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:.62rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s;}
.nb:hover{border-color:var(--gold);}
.nb.ans{background:var(--blue);border-color:var(--blue);color:#fff;}
.nb.ski{background:var(--orange);border-color:var(--orange);color:#fff;}
.nb.cur{outline:2px solid var(--gold-l);outline-offset:1px;}

/* RESULTS */
#results-page{display:none;min-height:100vh;background:var(--bg);padding:1.3rem .9rem 3rem;}
.rw{max-width:680px;margin:0 auto;}
.rtb{display:flex;justify-content:flex-end;margin-bottom:.7rem;}
.db2{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:.32rem .75rem;color:var(--text);font-size:.72rem;cursor:pointer;}
.rh{background:var(--navy);border-radius:var(--r);padding:1.6rem 1.1rem;text-align:center;margin-bottom:1.1rem;}
.rlogo{width:52px;height:52px;border-radius:50%;border:2px solid var(--gold-l);background:var(--navy2);margin:0 auto .75rem;}
.rname{font-family:'Playfair Display',serif;color:var(--gold-l);font-size:1.15rem;}
.rdist{color:rgba(255,255,255,.4);font-size:.75rem;margin-bottom:.9rem;}
.sring{width:105px;height:105px;border-radius:50%;background:conic-gradient(var(--gold-l) 0deg,rgba(240,192,64,.15) 0deg);display:flex;align-items:center;justify-content:center;margin:0 auto .8rem;}
.si{width:82px;height:82px;border-radius:50%;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;}
.sp{font-family:'Playfair Display',serif;color:var(--gold-l);font-size:1.4rem;line-height:1;}
.sl{font-size:.58rem;color:rgba(255,255,255,.38);letter-spacing:.1em;}
.sts{display:flex;gap:1.1rem;justify-content:center;flex-wrap:wrap;}
.sn{font-size:1.3rem;font-weight:700;color:var(--gold-l);}
.sk{font-size:.62rem;color:rgba(255,255,255,.42);text-transform:uppercase;letter-spacing:.07em;}
.rtitle{font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.75rem;}
.rq{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:.95rem 1rem;margin-bottom:.6rem;border-left:3px solid var(--border);}
.rq.c{border-left-color:var(--green);}
.rq.w{border-left-color:var(--red);}
.rq.s{border-left-color:var(--orange);}
.rqt{display:flex;align-items:center;justify-content:space-between;margin-bottom:.45rem;}
.rqn{font-size:.65rem;color:var(--muted);font-weight:600;}
.rqs{font-size:.62rem;font-weight:700;padding:.16rem .5rem;border-radius:20px;}
.rqs.c{background:rgba(22,163,74,.1);color:var(--green);}
.rqs.w{background:rgba(220,38,38,.1);color:var(--red);}
.rqs.s{background:rgba(234,88,12,.1);color:var(--orange);}
.rqq{font-size:.82rem;margin-bottom:.55rem;line-height:1.55;}
.ra{font-size:.75rem;padding:.3rem .65rem;border-radius:6px;margin-bottom:.28rem;}
.ra.yw{background:rgba(220,38,38,.07);color:var(--red);}
.ra.co{background:rgba(22,163,74,.07);color:var(--green);}
.ra.yc{background:rgba(22,163,74,.07);color:var(--green);}
.rref{font-size:.68rem;color:var(--muted);margin-top:.3rem;}
.btn-rt{display:block;margin:1.4rem auto 0;background:var(--navy);color:#fff;font-family:'Inter',sans-serif;font-size:.82rem;font-weight:700;padding:.72rem 2rem;border:none;border-radius:8px;cursor:pointer;transition:opacity .15s;}
.btn-rt:hover{opacity:.84;}

@media(max-width:480px){.qbtns{flex-wrap:wrap;}.bn{min-width:75px;}.c-card{padding:1.1rem;}}
</style>
</head>
<body>

<!-- COVER -->
<div id="cover-page">
  <img src="/mnt/user-data/uploads/20241021_150359.png" class="c-logo" alt="Logo" onerror="this.style.display='none'">
  <h1 class="c-title">Area 2 Youth Ministry<br>Church Heritage</h1>
  <p class="c-sub">Denominational History Mock Examination</p>

  <div class="c-card">
    <div>
      <label class="lbl" for="cand-name">Full Name</label>
      <input class="inp" type="text" id="cand-name" placeholder="e.g. Chisom Nwachukwu" autocomplete="name">
      <div class="err" id="err-name"></div>
    </div>
    <div>
      <label class="lbl" for="cand-district">District / Group</label>
      <select class="inp" id="cand-district">
        <option value="">— Select district —</option>
        <option>Iheorji-Umuogele District</option>
        <option>Eziukwu-Aba District</option>
        <option>Umuagbaghi District</option>
        <option>Port Harcourt Rd Group</option>
        <option>Umunisi Group</option>
      </select>
      <div class="err" id="err-district"></div>
    </div>
    <div>
      <label class="lbl">Number of Questions</label>
      <div class="cnt-row">
        <button class="cnt-btn on" onclick="setCount(50,this)">50 Qs</button>
        <button class="cnt-btn" onclick="setCount(100,this)">100 Qs</button>
        <button class="cnt-btn" onclick="setCount(150,this)">150 Qs</button>
      </div>
      <div style="color:rgba(255,255,255,.35);font-size:.68rem;margin-top:.35rem;">Questions are randomly selected from the full bank each session.</div>
    </div>
    <button class="btn-go" onclick="startQuiz()">Begin Examination ▸</button>
  </div>
</div>

<!-- QUIZ -->
<div id="quiz-page">
  <div class="qh">
    <div class="qhl">
      <img src="/mnt/user-data/uploads/20241021_150359.png" class="hl" alt="Logo" onerror="this.style.display='none'">
      <div>
        <div class="ht">Area 2 AYM</div>
        <div class="hs" id="header-sub">Church Heritage</div>
      </div>
    </div>
    <div style="display:flex;gap:.45rem;align-items:center;">
      <div class="tmr">⏱ <span class="tv" id="timer-val">60:00</span></div>
      <button class="dbtn" onclick="toggleDark()">🌙</button>
    </div>
  </div>
  <div class="pb"><div class="pf" id="prog-fill" style="width:0%"></div></div>

  <div class="qw">
    <div class="qcard">
      <div class="qmeta">
        <span class="qbadge" id="q-badge">Q 1 / 50</span>
        <span class="qcat" id="q-cat"></span>
      </div>
      <div class="qtxt" id="q-text"></div>
      <div class="opts" id="opts"></div>
      <div class="qbtns">
        <button class="bn" onclick="navigate(-1)">◀ Prev</button>
        <button class="bn bskip" onclick="skipQ()">↷ Skip</button>
        <button class="bn bnext" onclick="navigate(1)">Next ▶</button>
      </div>
    </div>
  </div>
</div>

<!-- NAV PANEL — outside all page divs -->
<div id="nav-panel">
  <div class="nt">
    <div class="nleg">
      <div class="nli"><div class="nd nd-a"></div>Answered</div>
      <div class="nli"><div class="nd nd-s"></div>Skipped</div>
      <div class="nli"><div class="nd nd-u"></div>Unanswered</div>
    </div>
    <button class="bsub" onclick="confirmSubmit()">✔ Submit</button>
  </div>
  <div class="nscroll"><div class="ngrid" id="nav-grid"></div></div>
</div>

<!-- RESULTS -->
<div id="results-page">
  <div class="rw">
    <div class="rtb"><button class="db2" onclick="toggleDark()">🌙 Dark Mode</button></div>
    <div class="rh">
      <img src="/mnt/user-data/uploads/20241021_150359.png" class="rlogo" alt="Logo" onerror="this.style.display='none'">
      <div class="rname" id="res-name"></div>
      <div class="rdist" id="res-dist"></div>
      <div class="sring" id="score-ring">
        <div class="si">
          <div class="sp" id="score-pct">0%</div>
          <div class="sl">SCORE</div>
        </div>
      </div>
      <div class="sts">
        <div><div class="sn" id="s-correct" style="color:#4ade80"></div><div class="sk">Correct</div></div>
        <div><div class="sn" id="s-wrong" style="color:#f87171"></div><div class="sk">Wrong</div></div>
        <div><div class="sn" id="s-skipped" style="color:#fb923c"></div><div class="sk">Skipped</div></div>
      </div>
    </div>
    <div class="rtitle">📖 Review &amp; Corrections</div>
    <div id="review-list"></div>
    <button class="btn-rt" onclick="retake()">↺ Retake</button>
  </div>
</div>

<script>
// ════════════════════════════════════════
// FULL QUESTION BANK (232 questions)
// ════════════════════════════════════════
const ALL_Q = [
  // Section 1 – The Christian Church
  {cat:"Section 1 – The Christian Church",q:"What is the seventh stage of the church described in the Church Heritage Manual?",o:["The Church of the Dark Ages","The Church of the Reformation","The Church of the Adventists","The Church of the Remnant"],a:2},
  {cat:"Section 1 – The Christian Church",q:"In which year did papal power become supreme, beginning a rule of 1,260 years?",o:["476 A.D.","538 A.D.","1798 A.D.","1517 A.D."],a:1},
  {cat:"Section 1 – The Christian Church",q:"Who became the first 'general president' of the apostolic church after Christ's ascension?",o:["Peter","Paul","James","John"],a:2},
  {cat:"Section 1 – The Christian Church",q:"Martin Luther nailed his 95 Theses to the Wittenberg Castle Church door on which date?",o:["October 31, 1517","November 13, 1517","October 22, 1517","September 16, 1620"],a:0},
  {cat:"Section 1 – The Christian Church",q:"Who is called 'the father of modern missions'?",o:["Robert Moffat","David Livingstone","William Carey","Adoniram Judson"],a:2},
  {cat:"Section 1 – The Christian Church",q:"The Waldenses resisted papal power from their home base in which geographical region?",o:["The plains of Germany","The mountains of northern Italy","The shores of the Mediterranean","The forests of Bohemia"],a:1},
  {cat:"Section 1 – The Christian Church",q:"What year did the Roman Empire fall to barbarian tribes?",o:["A.D. 313","A.D. 476","A.D. 538","A.D. 1000"],a:1},
  {cat:"Section 1 – The Christian Church",q:"John Huss was burned at the stake for exposing which church's unscriptural teachings?",o:["The Lutheran Church","The Anglican Church","The Roman Catholic Church","The Waldensian Church"],a:2},
  {cat:"Section 1 – The Christian Church",q:"William Tyndale gave common people of which country the Bible in their own language?",o:["Germany","France","Switzerland","England"],a:3},
  {cat:"Section 1 – The Christian Church",q:"The Mayflower carried the Pilgrim Fathers to which country in 1620?",o:["Canada","United States of America","Australia","South Africa"],a:1},
  // Section 2 – Heralds of the Advent
  {cat:"Section 2 – Heralds of the Advent",q:"What was the FIRST of the three spectacular signs that appeared between 1755 and 1843?",o:["The Dark Day","The Lisbon Earthquake","The falling of the stars","The end of the 1260-year prophecy"],a:1},
  {cat:"Section 2 – Heralds of the Advent",q:"On what date did the famous 'Dark Day' occur over the northeastern states of America?",o:["November 13, 1833","May 19, 1780","October 22, 1844","November 25, 1833"],a:1},
  {cat:"Section 2 – Heralds of the Advent",q:"The great meteor shower fulfilling Revelation 6:13 occurred on which date?",o:["November 13, 1833","November 25, 1833","May 19, 1780","November 1, 1755"],a:0},
  {cat:"Section 2 – Heralds of the Advent",q:"William Miller studied the 2300-day prophecy from which books of the Bible?",o:["Ezekiel and Revelation","Daniel 8 and 9","Isaiah and Daniel","Matthew and Luke"],a:1},
  {cat:"Section 2 – Heralds of the Advent",q:"Joshua V. Himes began publishing the Signs of the Times in which city in 1840?",o:["New York","Philadelphia","Boston","Washington D.C."],a:2},
  {cat:"Section 2 – Heralds of the Advent",q:"How many lectures did William Miller give over ten years of ministry?",o:["More than 1,000","More than 2,000","More than 3,000","More than 5,000"],a:2},
  {cat:"Section 2 – Heralds of the Advent",q:"Joseph Wolff was known as the 'missionary to the world.' How many languages did he speak?",o:["Seven","Ten","Twelve","Fourteen"],a:3},
  {cat:"Section 2 – Heralds of the Advent",q:"Charles Fitch developed the first prophetic charts in 1842, introducing which concept to public evangelism?",o:["Tent meetings","Audiovisuals","Camp meetings","Door-to-door canvassing"],a:1},
  {cat:"Section 2 – Heralds of the Advent",q:"Which Advent ambassador translated Lacunza's 'Coming of the Messiah' from Spanish into English?",o:["Henry Drummond","Robert Winter","Edward Irving","Johann Bengel"],a:2},
  {cat:"Section 2 – Heralds of the Advent",q:"Miller studied for how many years (1816–1831) before beginning public preaching?",o:["Ten","Twelve","Fifteen","Twenty"],a:2},
  // Section 3 – Birth of the Remnant Church
  {cat:"Section 3 – Birth of the Remnant Church",q:"Who had the cornfield experience on October 23, 1844, receiving insight about the heavenly sanctuary?",o:["Joseph Bates","James White","Hiram Edson","Frederick Wheeler"],a:2},
  {cat:"Section 3 – Birth of the Remnant Church",q:"Mrs. Rachel Oakes was a member of which denomination who introduced the Sabbath truth to the Adventists?",o:["Methodist","Baptist","Seventh Day Baptist","Presbyterian"],a:2},
  {cat:"Section 3 – Birth of the Remnant Church",q:"In what year did Ellen Harmon receive her first vision?",o:["1843","1844","1845","1846"],a:1},
  {cat:"Section 3 – Birth of the Remnant Church",q:"James and Ellen White were united in marriage on which date?",o:["August 30, 1846","October 22, 1844","December 30, 1849","April 18, 1847"],a:0},
  {cat:"Section 3 – Birth of the Remnant Church",q:"How old was Ellen Harmon when she received her first vision?",o:["Fifteen","Seventeen","Nineteen","Twenty-one"],a:1},
  {cat:"Section 3 – Birth of the Remnant Church",q:"The 'Midnight Cry' message focused on what date as the end of the 2300-day prophecy?",o:["March 21, 1844","April 18, 1844","October 22, 1844","October 31, 1844"],a:2},
  {cat:"Section 3 – Birth of the Remnant Church",q:"Ellen White was born on November 26, 1827, near which city in Maine?",o:["Augusta","Portland","Bath","Bangor"],a:1},
  {cat:"Section 3 – Birth of the Remnant Church",q:"Which of these is NOT one of the four Bible tests for a true prophet?",o:["Isaiah 8:20 – alignment with law and testimony","Matthew 7:20 – known by fruits","John 3:16 – belief in the gospel","1 John 4:2 – Jesus came in the flesh"],a:2},
  {cat:"Section 3 – Birth of the Remnant Church",q:"Ellen White held a large Bible in her extended hand for half an hour while in vision. How much did it weigh?",o:["Ten pounds","Fourteen pounds","Eighteen pounds","Twenty pounds"],a:2},
  {cat:"Section 3 – Birth of the Remnant Church",q:"Joseph Bates was the first future SDA leader to accept which truth?",o:["The sanctuary doctrine","The Sabbath truth","The state of the dead","The second advent"],a:1},
  // Section 4 – The Remnant Church Organized

function setCount(n, btn) {
  selectedCount = n;
  document.querySelectorAll('.cnt-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ════════════════════════
// START
// ════════════════════════
function startQuiz() {
  candName = document.getElementById('cand-name').value.trim();
  candDistrict = document.getElementById('cand-district').value;
  let ok = true;
  document.getElementById('err-name').textContent = '';
  document.getElementById('err-district').textContent = '';
  if (!candName) { document.getElementById('err-name').textContent = 'Please enter your full name.'; ok = false; }
  if (!candDistrict) { document.getElementById('err-district').textContent = 'Please select your district.'; ok = false; }
  if (!ok) return;

  activeQ = shuffle(ALL_Q).slice(0, selectedCount);
  userAns = new Array(activeQ.length).fill(null);
  currentQ = 0;
  submitted = false;
  secsLeft = selectedCount <= 50 ? 1800 : selectedCount <= 100 ? 3600 : 5400;

  document.getElementById('cover-page').style.display = 'none';
  document.getElementById('quiz-page').style.display = 'block';
  document.getElementById('nav-panel').style.display = 'block';
  document.getElementById('header-sub').textContent = candName + ' · ' + candDistrict;

  buildGrid();
  renderQ();
  startTimer();
}

// ════════════════════════
// TIMER
// ════════════════════════
function startTimer() {
  const el = document.getElementById('timer-val');
  function fmt() {
    const m = Math.floor(secsLeft / 60), s = secsLeft % 60;
    el.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  }
  fmt();
  timerInt = setInterval(() => {
    secsLeft--;
    fmt();
    if (secsLeft <= 300) el.classList.add('warn');
    if (secsLeft <= 0) { clearInterval(timerInt); submitQuiz(); }
  }, 1000);
}

// ════════════════════════
// RENDER
// ════════════════════════
function renderQ() {
  const q = activeQ[currentQ];
  document.getElementById('q-badge').textContent = `Q ${currentQ + 1} / ${activeQ.length}`;
  document.getElementById('q-cat').textContent = q.cat;
  document.getElementById('q-text').textContent = q.q;

  const optsEl = document.getElementById('opts');
  optsEl.innerHTML = '';
  ['A','B','C','D'].forEach((lt, i) => {
    const lbl = document.createElement('label');
    lbl.className = 'opt' + (userAns[currentQ] === i ? ' sel' : '');
    lbl.innerHTML = `<input type="radio" name="opt" value="${i}">
      <span class="ok">${lt}</span>
      <span class="ot">${q.o[i]}</span>`;
    lbl.addEventListener('click', () => selectAns(i));
    optsEl.appendChild(lbl);
  });

  updateGrid();
  updateProg();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectAns(idx) {
  userAns[currentQ] = idx;
  document.querySelectorAll('.opt').forEach((l, i) => l.classList.toggle('sel', i === idx));
  updateGrid();
}

// ════════════════════════
// NAV
// ════════════════════════
function navigate(dir) {
  const n = currentQ + dir;
  if (n < 0 || n >= activeQ.length) return;
  currentQ = n;
  renderQ();
}

function skipQ() {
  if (userAns[currentQ] === null) userAns[currentQ] = -1;
  navigate(1);
}

function jumpTo(idx) { currentQ = idx; renderQ(); }

function buildGrid() {
  const g = document.getElementById('nav-grid');
  g.innerHTML = '';
  activeQ.forEach((_, i) => {
    const b = document.createElement('button');
    b.className = 'nb';
    b.textContent = i + 1;
    b.id = `nb${i}`;
    b.addEventListener('click', () => jumpTo(i));
    g.appendChild(b);
  });
}

function updateGrid() {
  activeQ.forEach((_, i) => {
    const b = document.getElementById(`nb${i}`);
    if (!b) return;
    b.className = 'nb';
    if (userAns[i] === -1) b.classList.add('ski');
    else if (userAns[i] !== null) b.classList.add('ans');
    if (i === currentQ) b.classList.add('cur');
  });
}

function updateProg() {
  const done = userAns.filter(a => a !== null && a !== -1).length;
  document.getElementById('prog-fill').style.width = (done / activeQ.length * 100) + '%';
}

// ════════════════════════
// SUBMIT
// ════════════════════════
function confirmSubmit() {
  const u = userAns.filter(a => a === null).length;
  let msg = 'Submit your examination now?';
  if (u > 0) msg += `\n\n⚠ ${u} question(s) unanswered.`;
  if (confirm(msg)) submitQuiz();
}

function submitQuiz() {
  if (submitted) return;
  submitted = true;
  clearInterval(timerInt);

  let correct = 0, wrong = 0, skipped = 0;
  activeQ.forEach((q, i) => {
    if (userAns[i] === null || userAns[i] === -1) skipped++;
    else if (userAns[i] === q.a) correct++;
    else wrong++;
  });

  const pct = Math.round(correct / activeQ.length * 100);

  document.getElementById('quiz-page').style.display = 'none';
  document.getElementById('nav-panel').style.display = 'none';
  document.getElementById('results-page').style.display = 'block';

  document.getElementById('res-name').textContent = candName;
  document.getElementById('res-dist').textContent = candDistrict;
  document.getElementById('score-pct').textContent = pct + '%';
  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-wrong').textContent = wrong;
  document.getElementById('s-skipped').textContent = skipped;
  document.getElementById('score-ring').style.background =
    `conic-gradient(#f0c040 ${pct * 3.6}deg, rgba(240,192,64,0.15) ${pct * 3.6}deg)`;

  const rl = document.getElementById('review-list');
  rl.innerHTML = '';
  activeQ.forEach((q, i) => {
    const ua = userAns[i];
    let cls = 's', stxt = '↷ Skipped';
    if (ua !== null && ua !== -1) {
      cls = ua === q.a ? 'c' : 'w';
      stxt = ua === q.a ? '✓ Correct' : '✗ Wrong';
    }
    let ah = '';
    if (ua !== null && ua !== -1 && ua !== q.a) {
      ah = `<div class="ra yw">Your answer: ${q.o[ua]}</div><div class="ra co">Correct answer: ${q.o[q.a]}</div>`;
    } else if (ua === q.a) {
      ah = `<div class="ra yc">✓ ${q.o[q.a]}</div>`;
    } else {
      ah = `<div class="ra co">Correct answer: ${q.o[q.a]}</div>`;
    }
    const div = document.createElement('div');
    div.className = `rq ${cls}`;
    div.innerHTML = `
      <div class="rqt">
        <span class="rqn">Q${i+1} · ${q.cat}</span>
        <span class="rqs ${cls}">${stxt}</span>
      </div>
      <div class="rqq">${q.q}</div>
      ${ah}
      <div class="rref">📘 ${q.cat}</div>`;
    rl.appendChild(div);
  });

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function retake() {
  submitted = false;
  document.getElementById('results-page').style.display = 'none';
  document.getElementById('cover-page').style.display = 'flex';
  document.getElementById('timer-val').textContent = '30:00';
  document.getElementById('timer-val').classList.remove('warn');
}

function toggleDark() {
  document.body.classList.toggle('dark');
}
</script>
</body>
</html>
